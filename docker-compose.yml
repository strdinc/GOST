services:
  gost:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gost-service
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.gost.loadbalancer.server.port=5000"

      # Main app over HTTPS (www host)
      - "traefik.http.routers.gost-www-https.rule=Host(`www.gost.strdinc.space`)"
      - "traefik.http.routers.gost-www-https.entrypoints=websecure"
      - "traefik.http.routers.gost-www-https.tls=true"
      - "traefik.http.routers.gost-www-https.tls.certresolver=myresolver"
      - "traefik.http.routers.gost-www-https.service=gost"

      # Redirect HTTP -> HTTPS for www host
      - "traefik.http.routers.gost-www-http.rule=Host(`www.gost.strdinc.space`)"
      - "traefik.http.routers.gost-www-http.entrypoints=web"
      - "traefik.http.routers.gost-www-http.middlewares=gost-redirect-https"
      - "traefik.http.middlewares.gost-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.gost-redirect-https.redirectscheme.permanent=true"

      # Redirect non-www app host -> www app host
      - "traefik.http.routers.gost-nowww-http.rule=Host(`gost.strdinc.space`)"
      - "traefik.http.routers.gost-nowww-http.entrypoints=web"
      - "traefik.http.routers.gost-nowww-http.middlewares=gost-to-www"
      - "traefik.http.routers.gost-nowww-http.service=noop@internal"
      - "traefik.http.routers.gost-nowww-https.rule=Host(`gost.strdinc.space`)"
      - "traefik.http.routers.gost-nowww-https.entrypoints=websecure"
      - "traefik.http.routers.gost-nowww-https.tls=true"
      - "traefik.http.routers.gost-nowww-https.tls.certresolver=myresolver"
      - "traefik.http.routers.gost-nowww-https.middlewares=gost-to-www"
      - "traefik.http.routers.gost-nowww-https.service=noop@internal"
      - "traefik.http.middlewares.gost-to-www.redirectregex.regex=^https?://gost\\.strdinc\\.space/?(.*)"
      - "traefik.http.middlewares.gost-to-www.redirectregex.replacement=https://www.gost.strdinc.space/$${1}"
      - "traefik.http.middlewares.gost-to-www.redirectregex.permanent=true"

networks:
  proxy:
    external: true

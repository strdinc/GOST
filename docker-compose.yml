services:
  gost:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gost-service
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.gost.loadbalancer.server.port=5000"

      # lab3 app over HTTPS
      - "traefik.http.routers.gost-lab3-https.rule=Host(`lab3.gost.strdinc.space`)"
      - "traefik.http.routers.gost-lab3-https.entrypoints=websecure"
      - "traefik.http.routers.gost-lab3-https.tls=true"
      - "traefik.http.routers.gost-lab3-https.tls.certresolver=myresolver"
      - "traefik.http.routers.gost-lab3-https.service=gost"

      # Redirect HTTP -> HTTPS for lab3
      - "traefik.http.routers.gost-lab3-http.rule=Host(`lab3.gost.strdinc.space`)"
      - "traefik.http.routers.gost-lab3-http.entrypoints=web"
      - "traefik.http.routers.gost-lab3-http.middlewares=gost-lab3-redirect-https"
      - "traefik.http.middlewares.gost-lab3-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.gost-lab3-redirect-https.redirectscheme.permanent=true"

      # lab4 app over HTTPS
      - "traefik.http.routers.gost-lab4-https.rule=Host(`lab4.gost.strdinc.space`)"
      - "traefik.http.routers.gost-lab4-https.entrypoints=websecure"
      - "traefik.http.routers.gost-lab4-https.tls=true"
      - "traefik.http.routers.gost-lab4-https.tls.certresolver=myresolver"
      - "traefik.http.routers.gost-lab4-https.service=gost"

      # Redirect HTTP -> HTTPS for lab4
      - "traefik.http.routers.gost-lab4-http.rule=Host(`lab4.gost.strdinc.space`)"
      - "traefik.http.routers.gost-lab4-http.entrypoints=web"
      - "traefik.http.routers.gost-lab4-http.middlewares=gost-lab4-redirect-https"
      - "traefik.http.middlewares.gost-lab4-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.gost-lab4-redirect-https.redirectscheme.permanent=true"

      # Redirect old hosts -> lab3
      - "traefik.http.routers.gost-root-http.rule=Host(`gost.strdinc.space`) || Host(`www.gost.strdinc.space`)"
      - "traefik.http.routers.gost-root-http.entrypoints=web"
      - "traefik.http.routers.gost-root-http.middlewares=gost-root-to-lab3"
      - "traefik.http.routers.gost-root-http.service=noop@internal"
      - "traefik.http.routers.gost-root-https.rule=Host(`gost.strdinc.space`) || Host(`www.gost.strdinc.space`)"
      - "traefik.http.routers.gost-root-https.entrypoints=websecure"
      - "traefik.http.routers.gost-root-https.tls=true"
      - "traefik.http.routers.gost-root-https.tls.certresolver=myresolver"
      - "traefik.http.routers.gost-root-https.middlewares=gost-root-to-lab3"
      - "traefik.http.routers.gost-root-https.service=noop@internal"
      - "traefik.http.middlewares.gost-root-to-lab3.redirectregex.regex=^https?://(?:www\\.)?gost\\.strdinc\\.space/?(.*)"
      - "traefik.http.middlewares.gost-root-to-lab3.redirectregex.replacement=https://lab3.gost.strdinc.space/$${1}"
      - "traefik.http.middlewares.gost-root-to-lab3.redirectregex.permanent=true"

networks:
  proxy:
    external: true
